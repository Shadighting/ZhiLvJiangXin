<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅匠新 - 注册</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background: radial-gradient(circle at top, #1e293b, #020617);
            color: #e5e7eb;
        }
        body {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .card {
            width: 100%;
            max-width: 420px;
            padding: 32px 28px 26px;
            border-radius: 18px;
            background: rgba(15, 23, 42, 0.92);
            box-shadow:
                0 20px 45px rgba(15, 23, 42, 0.85),
                0 0 0 1px rgba(148, 163, 184, 0.35);
        }
        .title {
            text-align: center;
            font-size: 22px;
            letter-spacing: 0.2em;
            margin-bottom: 6px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #9ca3af;
            margin-bottom: 22px;
        }
        .field {
            margin-bottom: 16px;
        }
        .label {
            display: block;
            font-size: 13px;
            margin-bottom: 6px;
            color: #e5e7eb;
        }
        .input {
            width: 100%;
            padding: 9px 11px;
            border-radius: 10px;
            border: 1px solid #4b5563;
            background: rgba(15, 23, 42, 0.9);
            color: #e5e7eb;
            font-size: 14px;
            outline: none;
        }
        .input:focus {
            border-color: #38bdf8;
            box-shadow: 0 0 0 1px rgba(56, 189, 248, 0.6);
        }
        .error {
            min-height: 18px;
            font-size: 12px;
            color: #f97373;
            margin-bottom: 6px;
        }
        .success {
            min-height: 18px;
            font-size: 12px;
            color: #4ade80;
            margin-bottom: 6px;
        }
        .button {
            width: 100%;
            margin-top: 6px;
            padding: 10px 0;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #11a2ff, #31d8c1);
            color: #ffffff;
            font-size: 14px;
            font-weight: 600;
            letter-spacing: 0.16em;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.6);
            transition:
                transform 0.18s ease,
                box-shadow 0.18s ease,
                filter 0.18s ease;
        }
        .button:hover {
            transform: translateY(-1px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.75);
            filter: brightness(1.05);
        }
        .button:active {
            transform: translateY(0);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.65);
        }
        .button.secondary {
            margin-top: 10px;
            background: transparent;
            border: 1px solid #4b5563;
            color: #e5e7eb;
            letter-spacing: 0.12em;
            text-transform: none;
            box-shadow: none;
        }
        .button.secondary:hover {
            background: rgba(15, 23, 42, 0.8);
            box-shadow: 0 12px 26px rgba(0, 0, 0, 0.6);
        }
        .back-link {
            display: block;
            margin-top: 14px;
            text-align: center;
            font-size: 12px;
            color: #9ca3af;
            text-decoration: none;
        }
        .back-link:hover {
            color: #e5e7eb;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1 class="title">智旅匠新</h1>
        <p class="subtitle">管理入口 · 注册</p>

        <div id="error" class="error"></div>
        <div id="success" class="success"></div>

        <div class="field">
            <label class="label" for="username">用户名</label>
            <input class="input" id="username" autocomplete="username" />
        </div>
        <div class="field">
            <label class="label" for="password">密码</label>
            <input class="input" id="password" type="password" autocomplete="new-password" />
        </div>
        <div class="field">
            <label class="label" for="password2">确认密码</label>
            <input class="input" id="password2" type="password" autocomplete="new-password" />
        </div>

        <button class="button" id="registerSubmitBtn">注册</button>
        <button class="button secondary" id="backToLoginBtn" type="button">返回登录</button>
        <a href="index.html" class="back-link">← 返回首页</a>
    </div>

    <script>
        const apiBase = 'http://127.0.0.1:8000';
        const errorEl = document.getElementById('error');
        const successEl = document.getElementById('success');
        const submitBtn = document.getElementById('registerSubmitBtn');
        const backToLoginBtn = document.getElementById('backToLoginBtn');

        function clearMessages() {
            errorEl.textContent = '';
            successEl.textContent = '';
        }

        submitBtn.addEventListener('click', async () => {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const password2 = document.getElementById('password2').value;

            clearMessages();

            if (!username || !password || !password2) {
                errorEl.textContent = '请完整填写所有字段。';
                return;
            }

            if (password.length < 6) {
                errorEl.textContent = '密码长度至少为 6 位。';
                return;
            }

            if (password !== password2) {
                errorEl.textContent = '两次输入的密码不一致。';
                return;
            }

            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';

            try {
                const res = await fetch(apiBase + '/accounts/api/register/', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ username, password })
                });

                const data = await res.json().catch(() => ({}));

                if (!res.ok) {
                    errorEl.textContent = data.detail || '注册失败，请稍后重试。';
                } else {
                    const userInfo = { username: username || '用户' };
                    localStorage.setItem('zljx_user', JSON.stringify(userInfo));
                    successEl.textContent = '注册成功，正在跳转首页...';
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 800);
                }
            } catch (e) {
                errorEl.textContent = '无法连接到注册服务，请确认后端已启动。';
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '注册';
            }
        });

        backToLoginBtn.addEventListener('click', () => {
            window.location.href = 'login.html';
        });
    </script>
</body>
</html>
