<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅匠新-数字地图</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet/leaflet.css">
    
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    
    <!-- 应用程序样式 -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 内联关键CSS：让地图充满整个页面并始终居中显示 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 0;
        }

        .container {
            max-width: none;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        main {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
        }

        #mapContainer {
            width: 100%;
            height: 100%;
            background: #f0f0f0;
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }
        
        #chinaMap {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }

        .leaflet-container {
            background-color: #C3E0C2; /* 淡蓝色底色，可替换为任意颜色 */
        }

        @media (max-width: 1200px) {
            .container {
                padding: 0 10px;
            }
        }
    </style>
</head>
<body class="map-page">
    <div id="site-navbar"></div>
    <script src="components/navbar/navbar.js"></script>
    <div class="container">
        <main>
            <div class="map-container">
                <div id="mapContainer">
                    <div id="chinaMap"></div>
                    <div class="loading" id="loadingMessage">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载地图...
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <h2><i class="fas fa-info-circle"></i> 相关信息</h2>
                
                
                <div class="panel-content">
                    <div id="provinceInfo">
                        <h3 id="provinceName" class="sidetitle">永兴坊</h3>
                        <p id="provinceDescription">点击任意点位开始探索</p>
                        
                        <div class="info-item" style="display: none;">
                            <label><i class="name"></i> 名称：</label>
                            <span id="name">-</span>
                        </div>

                        <div class="info-item" style="display: none;">
                            <label><i class="name"></i> 简介：</label>
                            <span id="name">-</span>
                        </div>

                        <a id="NevigationLink" href="#" style="display: none;" class="info-link" target="_blank">导航</a>
                        <a id="SiteLink" href="#" style="display: none;" class="info-link" target="_blank">查看详情</a>
                        
                        
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 音乐按钮 -->
    <audio id="bgMusic" loop>
        <source src="feature/bgmusic.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" class="music-btn">
        <img id="musicImg" src="feature/MusicPause.png" alt="音乐图标">
    </button>
    
    <!-- 离线jQuery -->
    <script src="lib/jquery/jquery.min.js"></script>
    
    <!-- 离线Leaflet JS -->
    <script src="lib/leaflet/leaflet.js"></script>
    
    <!-- 配置文件 -->
    <script src="config.js"></script>
    
    <!-- 主应用程序 -->
    <script src="script.js"></script>

    <!-- 右侧信息栏折叠逻辑 -->
    <button class="side-toggle-btn" id="sideToggleBtn" aria-label="切换信息栏">
        <i class="fas fa-chevron-left"></i>
    </button>
    <script>
        (function () {
            var btn = document.getElementById('sideToggleBtn');
            var body = document.body;
            if (!btn) return;

            btn.addEventListener('click', function () {
                body.classList.toggle('panel-collapsed');
            });
        })();
    </script>
</body>
</html>
