<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅匠新-数字地图</title>
    <link rel="icon" href="feature/icon/LOGO.png" type="image/png">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet/leaflet.css">
    
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    
    <!-- 应用程序样式 -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 内联关键CSS：让地图充满整个页面并始终居中显示 */
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
        }

        body {
            padding: 0;
        }

        .container {
            max-width: none;
            margin: 0;
            padding: 0;
            height: 100vh;
        }

        main {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .map-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            z-index: 0;
        }

        #mapContainer {
            width: 100%;
            height: 100%;
            background: #FCF9F2; /* 牙白：地图画布背景 */
            border-radius: 0;
            overflow: hidden;
            position: relative;
        }
        
        #chinaMap {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #555555; /* 重墨 */
        }

        .leaflet-container {
            background-color: #FCF9F2; /* 牙白：地图底图 */
        }

        @media (max-width: 1200px) {
            .container {
                padding: 0 10px;
            }
        }
    </style>
</head>
<body class="map-page">
    <div id="site-navbar"></div>
    <script src="components/navbar/navbar.js"></script>
    <div class="container">
        <main>
            <div class="map-container">
                <div id="mapContainer">
                    <div id="chinaMap"></div>
                    <div class="loading" id="loadingMessage">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载地图...
                    </div>
                </div>
            </div>

            <!-- 左侧任务栏 -->
            <div class="side-panel side-panel--left">
                <h2><i class="fas fa-clipboard-list"></i> 任务清单</h2>
                <div class="panel-content panel-content--tasks">
                    <ul id="taskList" class="task-list"></ul>
                    <div id="taskProgress" class="task-progress"></div>
                </div>
            </div>
            
            <!-- 右侧信息栏 -->
            <div class="side-panel side-panel--right">
                <h2><i class="fas fa-info-circle"></i> 相关信息</h2>
                
                
                <div class="panel-content">
                    <div id="provinceInfo">
                        <h3 id="provinceName" class="sidetitle">永兴坊</h3>
                        <p id="provinceDescription">点击任意点位开始探索</p>

                        <div class="info-item" style="display: none;">
                            <label><i class="name"></i> 名称：</label>
                            <span id="name">-</span>
                        </div>

                        <div class="info-item" style="display: none;">
                            <label><i class="name"></i> 简介：</label>
                            <span id="name">-</span>
                        </div>

                        <a id="NevigationLink" href="#" style="display: none;" class="info-link" target="_blank">导航</a>
                        <a id="SiteLink" href="#" style="display: none;" class="info-link" target="_blank">查看详情</a>
                        
                        
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- 点位详情弹窗（盲盒奖励样式） -->
    <div id="pointModal" class="point-modal-overlay" aria-hidden="true">
        <div class="point-modal-box">
            <header class="point-modal-header">
                <button type="button" class="point-modal-close" aria-label="关闭">×</button>
                <span class="point-modal-header-icon"><i class="fas fa-gift"></i></span>
                <h2 class="point-modal-title">恭喜获得</h2>
                <p class="point-modal-subtitle">盲盒奖励</p>
            </header>
            <div class="point-modal-body">
                <div class="point-modal-icon-wrap">
                    <img class="point-modal-icon-img" id="pointModalImage" src="" alt="">
                </div>
                <p class="point-modal-discount-label">线下门店折扣</p>
                <p class="point-modal-discount-text" id="pointModalText">陕西非遗戏曲博物馆讲解9折优惠</p>
                <div class="point-modal-tip">
                    <i class="fas fa-lightbulb point-modal-tip-icon"></i>
                    <span>到店出示此页面即可享受折扣!</span>
                </div>
            </div>
            <footer class="point-modal-footer">
                <button type="button" class="point-modal-btn-claim">收下奖励</button>
            </footer>
        </div>
    </div>

    <!-- 音乐按钮 -->
    <audio id="bgMusic" loop>
        <source src="feature/bgmusic.mp3" type="audio/mpeg">
    </audio>
    <button id="musicBtn" class="music-btn">
        <img id="musicImg" src="feature/MusicPause.png" alt="音乐图标">
    </button>
    
    <!-- 离线jQuery -->
    <script src="lib/jquery/jquery.min.js"></script>
    
    <!-- 离线Leaflet JS -->
    <script src="lib/leaflet/leaflet.js"></script>
    
    <!-- 配置文件 -->
    <script src="config.js"></script>
    
    <!-- 主应用程序 -->
    <script src="script.js"></script>

    <!-- 信息栏折叠逻辑 -->
    <button class="side-toggle-btn side-toggle-btn-right" id="sideToggleBtn" aria-label="切换右侧信息栏">
        <i class="fas fa-chevron-left"></i>
    </button>
    <button class="side-toggle-btn side-toggle-btn-left" id="sideToggleLeftBtn" aria-label="切换任务栏">
        <i class="fas fa-chevron-right"></i>
    </button>
    <script>
        (function () {
            var btnRight = document.getElementById('sideToggleBtn');
            var btnLeft = document.getElementById('sideToggleLeftBtn');
            var body = document.body;
            
            if (btnRight) {
                btnRight.addEventListener('click', function () {
                    body.classList.toggle('panel-collapsed');
                });
            }

            if (btnLeft) {
                btnLeft.addEventListener('click', function () {
                    body.classList.toggle('panel-left-collapsed');
                });
            }
        })();
    </script>
</body>
</html>
