<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>用户登录</title>
</head>
<body>
    <h1>登录</h1>

    {% if form.errors %}
        <p style="color:red;">用户名或密码错误，请重试。</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        <div>
            <label for="id_username">用户名：</label>
            {{ form.username }}
        </div>
        <div>
            <label for="id_password">密码：</label>
            {{ form.password }}
        </div>
        <button type="submit">登录</button>
    </form>
</body>
</html>
