<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Leaflet 限制地图拖动范围</title>
    <!-- 引入 Leaflet CSS 和 JS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        #map { width: 100%; height: 600px; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script>
        // 1. 定义地图的拖动边界（西南角、东北角 经纬度）
        // 示例：限制在北京市核心区域（可替换为你需要的经纬度范围）
        const bounds = L.latLngBounds(
            [39.6, 115.9],  // 西南角：纬度(lat)、经度(lng)
            [40.2, 116.8]   // 东北角：纬度(lat)、经度(lng)
        );

        // 2. 创建地图实例，设置初始中心点和缩放级别
        const map = L.map('map', {
            maxBounds: bounds,  // 直接在初始化时设置边界（也可后续用 map.setMaxBounds(bounds)）
            maxBoundsViscosity: 1.0, // 拖动到边界时的"粘性"，1=完全限制，0=无限制
            minZoom: 10,        // 可选：限制最小缩放级别（避免缩小时超出边界）
            maxZoom: 18         // 可选：限制最大缩放级别
        }).setView([39.9, 116.4], 12); // 初始中心点（北京）、初始缩放级别

        // 3. 加载底图图层（OpenStreetMap）
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
        }).addTo(map);

        // 可选：如果初始化时未设置，可后续通过此方法设置边界
        // map.setMaxBounds(bounds);

        // 可选：调整边界缓冲（默认0，即严格限制；0.1表示边界外10%的缓冲区域）
        // map.setMaxBounds(bounds, { boundsPad: 0.1 });
    </script>
</body>
</html>
