<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅匠新-数字地图</title>
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet/leaflet.css">
    
    <!-- Font Awesome CSS -->
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    
    <!-- 应用程序样式 -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 内联关键CSS确保立即加载 */
        #mapContainer {
            width: 100%;
            height: 600px;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        #chinaMap {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-map" id="title"></i> 智旅匠新-数字地图</h1>
            
        </header>
        
        <main>
            <div class="map-container">
                <div id="mapContainer">
                    <div id="chinaMap"></div>
                    <div class="loading" id="loadingMessage">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载地图...
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <h2><i class="fas fa-info-circle"></i> 相关信息</h2>
                
                
                <div class="panel-content">
                    <div id="provinceInfo">
                        <h3 id="provinceName" class="sidetitle">永兴坊</h3>
                        <p id="provinceDescription">点击任意点位开始探索</p>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <label><i class="name"></i> 名称：</label>
                                <span id="name">-</span>
                            </div>
                            <div class="info-item">
                                <label><i class="picture"></i> 图片：</label>
                                <span id="picture">-</span>
                            </div>
                        </div>

                        <a id="NevigationLink" href="#" style="display: none;" class="info-link">导航</a>
                        <a id="SiteLink" href="#" style="display: none;" class="info-link">查看详情</a>
                        
                        
                    </div>
                </div>
                
            </div>
        </main>
        
        <footer>
            <p>© 离线地图系统 | 基于 <a href="https://leafletjs.com/" target="_blank">Leaflet</a></p>
        </footer>
    </div>
    
    <!-- 离线jQuery -->
    <script src="lib/jquery/jquery.min.js"></script>
    
    <!-- 离线Leaflet JS -->
    <script src="lib/leaflet/leaflet.js"></script>
    
    <!-- 配置文件 -->
    <script src="config.js"></script>
    
    <!-- 主应用程序 -->
    <script src="script.js"></script>
</body>
</html>
