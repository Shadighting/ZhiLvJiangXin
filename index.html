<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>离线中国分省地图</title>
    
    <!-- 离线Leaflet CSS -->
    <link rel="stylesheet" href="lib/leaflet/leaflet.css">
    
    <!-- 离线Font Awesome CSS -->
    <link rel="stylesheet" href="lib/font-awesome/css/all.min.css">
    
    <!-- 应用程序样式 -->
    <link rel="stylesheet" href="style.css">
    
    <style>
        /* 内联关键CSS确保立即加载 */
        #mapContainer {
            width: 100%;
            height: 600px;
            background: #f0f0f0;
            border-radius: 8px;
            overflow: hidden;
            position: relative;
        }
        
        #chinaMap {
            width: 100%;
            height: 100%;
        }
        
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #666;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1><i class="fas fa-map"></i> 离线中国分省地图</h1>
            <p class="subtitle">完全本地运行，无需网络连接</p>
        </header>
        
        <main>
            <div class="map-container">
                <div id="mapContainer">
                    <div id="chinaMap"></div>
                    <div class="loading" id="loadingMessage">
                        <i class="fas fa-spinner fa-spin"></i> 正在加载地图...
                    </div>
                </div>
            </div>
            
            <div class="side-panel">
                <h2><i class="fas fa-info-circle"></i> 省份信息</h2>
                
                <div class="instruction">
                    <p><i class="fas fa-mouse-pointer"></i> 点击地图上的省份查看详细信息</p>
                    <p><i class="fas fa-laptop-house"></i> 当前模式：<strong>完全离线</strong></p>
                </div>
                
                <div class="panel-content">
                    <div id="provinceInfo">
                        <h3 id="provinceName">中国分省地图</h3>
                        <p id="provinceDescription">点击任意省份开始探索</p>
                        
                        <div class="info-grid">
                            <div class="info-item">
                                <label><i class="fas fa-signature"></i> 简称：</label>
                                <span id="provinceShortName">-</span>
                            </div>
                            <div class="info-item">
                                <label><i class="fas fa-landmark"></i> 首府：</label>
                                <span id="provinceCapital">-</span>
                            </div>
                            <div class="info-item">
                                <label><i class="fas fa-hashtag"></i> 代码：</label>
                                <span id="provinceCode">-</span>
                            </div>
                        </div>
                        
                        <div id="provinceDetails">
                            <p id="provinceDetailText">详细信息将在此显示</p>
                        </div>
                    </div>
                </div>
                
                <div class="data-status">
                    <div class="status-item">
                        <span class="status-label">地图状态：</span>
                        <span class="status-indicator" id="mapStatus">
                            <i class="fas fa-circle"></i> 准备中
                        </span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">数据状态：</span>
                        <span class="status-indicator" id="dataStatus">
                            <i class="fas fa-circle"></i> 准备中
                        </span>
                    </div>
                </div>
            </div>
        </main>
        
        <footer>
            <p>© 2023 离线地图系统 | 基于 <a href="https://leafletjs.com/" target="_blank">Leaflet</a></p>
            <p class="footer-note">所有资源均已本地化，可完全离线使用</p>
        </footer>
    </div>
    
    <!-- 离线jQuery -->
    <script src="lib/jquery/jquery.min.js"></script>
    
    <!-- 离线Leaflet JS -->
    <script src="lib/leaflet/leaflet.js"></script>
    
    <!-- 配置文件 -->
    <script src="config.js"></script>
    
    <!-- 主应用程序 -->
    <script src="script.js"></script>
</body>
</html>
