<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智旅匠新 - 首页</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            height: 100%;
            overflow: hidden; /* 禁止滚动 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Microsoft YaHei", sans-serif;
            background-color: #000;
        }

        body {
            display: flex;
            align-items: stretch;
            justify-content: center;
        }

        .hero {
            position: relative;
            flex: 1;
            min-height: 100vh;
            max-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #ffffff;
        }

        .hero::before {
            content: "";
            position: absolute;
            inset: 0;
            background: url("feature/map.png") center center / cover no-repeat fixed;
            filter: brightness(0.8);
            transform: scale(1.03);
        }

        .hero::after {
            content: "";
            position: absolute;
            inset: 0;
            background:
                linear-gradient(to bottom, rgba(255, 255, 255, 0.30), rgba(255, 255, 255, 0.06)),
                radial-gradient(circle at top, rgba(255, 255, 255, 0.25), transparent 65%);
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            width: 100%;
            max-width: 960px;
            padding: 40px 32px 32px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            gap: 32px;
            text-align: center;
        }

        .title-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .subtitle {
            letter-spacing: 0.32em;
            text-transform: uppercase;
            font-size: 13px;
            color: rgba(0, 0, 0, 0.65);
        }

        .main-title {
            font-size: 52px;
            letter-spacing: 0.22em;
            text-indent: 0.22em;
            font-weight: 700;
            color: #FFFFFF;
            text-shadow: 0 10px 24px rgba(0, 0, 0, 0.25);
        }

        .tagline {
            font-size: 17px;
            color: rgba(15, 23, 42, 0.9);
        }

        .divider {
            width: 96px;
            height: 1px;
            margin-top: 8px;
            background: linear-gradient(to right, transparent, rgba(255, 255, 255, 0.8), transparent);
        }

        .intro-card {
            max-width: 720px;
            padding: 26px 30px;
            border-radius: 20px;
            background: rgba(255, 255, 255, 0.92);
            box-shadow:
                0 20px 45px rgba(15, 23, 42, 0.32),
                0 0 0 1px rgba(148, 163, 184, 0.35);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .intro-title {
            font-size: 19px;
            font-weight: 650;
            letter-spacing: 0.18em;
            color: #0f172a;
        }

        .intro-text {
            font-size: 14px;
            line-height: 1.9;
            color: #334155;
        }

        .cta-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .enter-button {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 42px;
            border-radius: 999px;
            border: none;
            background: linear-gradient(135deg, #11a2ff, #31d8c1);
            color: #ffffff;
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 0.18em;
            text-decoration: none;
            text-transform: uppercase;
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.55);
            cursor: pointer;
            transition:
                transform 0.18s ease,
                box-shadow 0.18s ease,
                filter 0.18s ease,
                background-position 0.18s ease;
            background-size: 180% 180%;
            background-position: 0% 50%;
        }

        .enter-button::after {
            content: "➜";
            font-size: 14px;
        }

        .enter-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 18px 40px rgba(0, 0, 0, 0.7);
            filter: brightness(1.08);
            background-position: 100% 50%;
        }

        .enter-button:active {
            transform: translateY(0);
            box-shadow: 0 10px 22px rgba(0, 0, 0, 0.6);
        }

        .copyright {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.68);
        }

        @media (max-width: 768px) {
            .hero-content {
                padding: 28px 22px 22px;
                gap: 24px;
            }

            .main-title {
                font-size: 30px;
            }

            .tagline {
                font-size: 14px;
            }

            .intro-card {
                padding: 18px 18px;
            }
        }

        @media (max-width: 480px) {
            .hero-content {
                padding: 24px 16px 18px;
                gap: 20px;
            }

            .subtitle {
                font-size: 11px;
            }

            .main-title {
                font-size: 24px;
            }

            .intro-title {
                font-size: 16px;
            }

            .intro-text {
                font-size: 13px;
            }

            .enter-button {
                width: 100%;
                padding-inline: 0;
            }
        }
    </style>
</head>
    <body>
    <div id="site-navbar"></div>
    <section class="hero" aria-label="智旅匠新首页">
        <div class="hero-content">
            <header class="title-group">
                <p class="subtitle">SMART TOURISM · DIGITAL MAP</p>
                <h1 class="main-title">智旅匠新</h1>
                <p class="tagline">以数字地图点亮文化与旅游空间</p>
                <div class="divider"></div>
            </header>

            <main class="intro-card">
                <h2 class="intro-title">项目简介 / INTRODUCTION</h2>
                <p class="intro-text">
                    智旅匠新致力于将地理信息与文旅内容深度融合，
                    通过离线数字地图呈现景点分布、主题场景与互动体验。
                    您可以在此用简短的文字介绍项目愿景、核心亮点与应用场景，
                    让访问者在进入地图之前，对整个系统有一个清晰直观的第一印象。
                </p>
            </main>

            <footer class="cta-area">
                <a href="map.html" class="enter-button">进入数字地图</a>
                <p class="copyright">© 智旅匠新 · 数字地图系统</p>
            </footer>
        </div>
    </section>

    <script src="components/navbar/navbar.js"></script>
</body>
</html>
