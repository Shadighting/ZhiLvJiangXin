 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>详情内容展示页</title>
   <link rel="icon" href="../../icon/LOGO.png" type="image/png" />
   <link rel="stylesheet" href="styles.css" />
 </head>
 <body>


   <div id="site-navbar"></div>

   <div class="detail-page">
     <header class="detail-header">
       <h1 class="detail-title">详情展示</h1>
       <p class="detail-subtitle">图文介绍展示页</p>
     </header>
 
     <main class="detail-main">
       <section class="image-section">
         <div class="image-frame">
           <img
             id="mainImage"
             src="../img/picture.jpg"
             alt="展示图片"
           />
         </div>
         <div class="thumbnail-list">
           <button class="thumb-item" data-image="../img/picture.jpg" data-title="" >
             油泼辣子
           </button>
         </div>
       </section>
 
       <section class="text-section">
         <h2 id="detailTitle" class="text-title">油泼辣子</h2>
         <p id="detailDesc" class="text-content">
           核心是“秦椒为主、热油分次泼、香料增香”；秦椒色泽红亮、辣度适中、香味浓郁；传统做法是辣椒面加白芝麻、八角、桂皮、花椒，浇入七八成热菜籽油激出复合香气；油润红亮、辣而不燥、香气醇厚，是陕西面食（biangbiang面、油泼面）的灵魂调味，也可佐夹馍、拌凉菜。
         </p>
 
         <div class="info-grid">
           <div class="info-item">
             <span class="info-label">口味</span>
             <span class="info-value">辣而不燥、香气醇厚</span>
           </div>
           <div class="info-item">
             <span class="info-label">适合人群</span>
             <span class="info-value">美食爱好者</span>
           </div>
           <div class="info-item">
             <span class="info-label">推荐时间</span>
             <span class="info-value">随时</span>
           </div>
         </div>
 
       </section>
     </main>
 
     <footer class="detail-footer">
     </footer>
   </div>
 
   <script src="script.js"></script>
   <script src="/components/navbar/navbar.js"></script>
