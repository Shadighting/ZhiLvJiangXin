 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>详情内容展示页</title>
   <link rel="icon" href="../../icon/LOGO.png" type="image/png" />
   <link rel="stylesheet" href="styles.css" />
 </head>
 <body>


   <div id="site-navbar"></div>

   <div class="detail-page">
     <header class="detail-header">
       <h1 class="detail-title">详情展示</h1>
       <p class="detail-subtitle">图文介绍展示页</p>
     </header>
 
     <main class="detail-main">
       <section class="image-section">
         <div class="image-frame">
           <img
             id="mainImage"
             src="../img/picture.jpg"
             alt="展示图片"
           />
         </div>
         <div class="thumbnail-list">
           <button class="thumb-item" data-image="../img/picture.jpg" data-title="" >
             皮影戏
           </button>
         </div>
       </section>
 
       <section class="text-section">
         <h2 id="detailTitle" class="text-title">皮影戏</h2>
         <p id="detailDesc" class="text-content">
           以优质牛皮经泡刮、雕刻、彩绘、脱水等多道工序制成；人物造型古朴夸张、线条精细，色彩艳丽；表演时艺人在幕后持杆操控影偶，配合秦腔/碗碗腔唱腔与打击乐，光影投射于素幕上演故事；是集美术、音乐、戏剧于一体的“活化石”艺术，2011年入选人类非遗。
         </p>
 
         <div class="info-grid">
           <div class="info-item">
             <span class="info-label">特色</span>
             <span class="info-value">古朴夸张造型</span>
           </div>
           <div class="info-item">
             <span class="info-label">适合人群</span>
             <span class="info-value">文化爱好者</span>
           </div>
           <div class="info-item">
             <span class="info-label">推荐时间</span>
             <span class="info-value">演出时间</span>
           </div>
         </div>
 
       </section>
     </main>
 
     <footer class="detail-footer">
     </footer>
   </div>
 
   <script src="script.js"></script>
   <script src="/components/navbar/navbar.js"></script>
 </body>
 </html>
