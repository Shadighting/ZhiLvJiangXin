 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>详情内容展示页</title>
   <link rel="icon" href="../../icon/LOGO.png" type="image/png" />
   <link rel="stylesheet" href="styles.css" />
 </head>
 <body>


   <div id="site-navbar"></div>

   <div class="detail-page">
     <header class="detail-header">
       <h1 class="detail-title">详情展示</h1>
       <p class="detail-subtitle">图文介绍展示页</p>
     </header>
 
     <main class="detail-main">
       <section class="image-section">
         <div class="image-frame">
           <img
             id="mainImage"
             src="../img/picture.jpg"
             alt="展示图片"
           />
         </div>
         <div class="thumbnail-list">
           <button class="thumb-item" data-image="../img/picture.jpg" data-title="" >
             白火石汆汤
           </button>
         </div>
       </section>
 
       <section class="text-section">
         <h2 id="detailTitle" class="text-title">白火石汆汤</h2>
         <p id="detailDesc" class="text-content">
           古老“石烹”技艺的活化石；选用汉阴白河的白火石（石英质卵石），炭火中烧至通红，
           投入盛有肉泥、高汤、时蔬的砂锅，瞬间高温使汤沸、肉熟；成品汤清味鲜、肉质滑嫩无腥，保留食材本味与营养，
           清淡不腻，适合老幼；2016年入选陕西非遗，2014年获评陕西名菜。
         </p>
 
         <div class="info-grid">
           <div class="info-item">
             <span class="info-label">口味</span>
             <span class="info-value">鲜香、清淡</span>
           </div>
           <div class="info-item">
             <span class="info-label">适合人群</span>
             <span class="info-value">美食爱好者、健康饮食追求者</span>
           </div>
           <div class="info-item">
             <span class="info-label">推荐时间</span>
             <span class="info-value">午餐、晚餐</span>
           </div>
         </div>
 
       </section>
     </main>
 
     <footer class="detail-footer">
     </footer>
   </div>
 
   <script src="script.js"></script>
   <script src="/components/navbar/navbar.js"></script>
 </body>
 </html>
