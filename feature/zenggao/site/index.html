 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>详情内容展示页</title>
   <link rel="icon" href="../../icon/LOGO.png" type="image/png" />
   <link rel="stylesheet" href="styles.css" />
 </head>
 <body>


   <div id="site-navbar"></div>

   <div class="detail-page">
     <header class="detail-header">
       <h1 class="detail-title">详情展示</h1>
       <p class="detail-subtitle">图文介绍展示页</p>
     </header>
 
     <main class="detail-main">
       <section class="image-section">
         <div class="image-frame">
           <img
             id="mainImage"
             src="../img/picture.jpg"
             alt="展示图片"
           />
         </div>
         <div class="thumbnail-list">
           <button class="thumb-item" data-image="../img/picture.jpg" data-title="" >
             西安传统甑糕
           </button>
         </div>
       </section>
 
       <section class="text-section">
         <h2 id="detailTitle" class="text-title">西安传统甑糕</h2>
         <p id="detailDesc" class="text-content">
           用特制铁甑，一层糯米一层红枣（或芸豆）分层铺码，经数小时武火转文火焖蒸；糯米软糯、红枣蜜甜，米枣交融、入口即化，甜而不腻；传统多为早餐，热食最佳，是冬春季节西安街头常见的风味小吃。
         </p>
 
         <div class="info-grid">
           <div class="info-item">
             <span class="info-label">口味</span>
             <span class="info-value">甜而不腻</span>
           </div>
           <div class="info-item">
             <span class="info-label">适合人群</span>
             <span class="info-value">早餐爱好者</span>
           </div>
           <div class="info-item">
             <span class="info-label">推荐时间</span>
             <span class="info-value">早餐</span>
           </div>
         </div>
 
       </section>
     </main>
 
     <footer class="detail-footer">
     </footer>
   </div>
 
   <script src="script.js"></script>
   <script src="/components/navbar/navbar.js"></script>
 </body>
 </html>
