 <!DOCTYPE html>
 <html lang="zh-CN">
 <head>
   <meta charset="UTF-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <title>详情内容展示页</title>
   <link rel="icon" href="../../icon/LOGO.png" type="image/png" />
   <link rel="stylesheet" href="styles.css" />
 </head>
 <body>


   <div id="site-navbar"></div>

   <div class="detail-page">
     <header class="detail-header">
       <h1 class="detail-title">详情展示</h1>
       <p class="detail-subtitle">图文介绍展示页</p>
     </header>
 
     <main class="detail-main">
       <section class="image-section">
         <div class="image-frame">
           <img
             id="mainImage"
             src="../img/picture.jpg"
             alt="展示图片"
           />
         </div>
         <div class="thumbnail-list">
           <button class="thumb-item" data-image="../img/picture.jpg" data-title="" >
             埙
           </button>
         </div>
       </section>
 
       <section class="text-section">
         <h2 id="detailTitle" class="text-title">埙</h2>
         <p id="detailDesc" class="text-content">
           八音中的“土音”，中国最古老的吹奏乐器之一；以陶土烧制，常见卵形，顶端为吹孔，侧面有音孔（现代多为8孔）；音色古朴、低沉、醇厚，有沧桑感，适合表现悠远、肃穆的意境，常用于古乐、琴埙合奏。
         </p>
 
         <div class="info-grid">
           <div class="info-item">
             <span class="info-label">特色</span>
             <span class="info-value">古朴低沉音色</span>
           </div>
           <div class="info-item">
             <span class="info-label">适合人群</span>
             <span class="info-value">音乐爱好者</span>
           </div>
           <div class="info-item">
             <span class="info-label">推荐时间</span>
             <span class="info-value">演奏时间</span>
           </div>
         </div>
 
       </section>
     </main>
 
     <footer class="detail-footer">
     </footer>
   </div>
 
   <script src="script.js"></script>
   <script src="/components/navbar/navbar.js"></script>
 </body>
 </html>
